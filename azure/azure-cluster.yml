cluster:
  name: office-aks
  resource_group: test-kuberentes-resource-group
  location: westus3
  kubeconfig: ~/.kube/azureconfig

  node_pool:
    vm_size: Standard_A4_v2
    min_count: 1
    max_count: 5

  autoscaler:
    enabled: true
    scan_interval: 30s
    scale_down_unneeded_time: 5m
    scale_down_delay_after_add: 5m

  load_balancer_sku: standard
  # network_plugin: kubenet
  network_plugin: azure
  tier: free

  gateway_api:
    enabled: true
