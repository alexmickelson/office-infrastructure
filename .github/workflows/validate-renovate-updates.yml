name: Validate Renovate Updates

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "ai-office-server/**/*.yml"
      - "ai-office-server/**/*.yaml"
      - "ai-office-server/docker-compose.yml"
      - "flake.nix"
      - "flake.lock"

jobs:
  validate:
    name: Validate Renovate Updates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run validation suite
        run: |
          nix run .#kubernetes-validation
          nix run .#kube-security-validation
          nix run .#helm-validation
          nix run .#docker-security-scan
