apiVersion: v1
kind: Namespace
metadata:
  name: alex-dashboard
  annotations:
    repo: "https://github.com/alexmickelson/office-infrastructure"
    path: "ai-office-server/kubernetes/argocd/alexDashboard"
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: alex-dashboard
spec:
  selector:
    app: dashboard
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: alex-dashboard
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: dashboard-html
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: dashboard-html
          configMap:
            name: dashboard-html
