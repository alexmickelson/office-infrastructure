apiVersion: v1
kind: Namespace
metadata:
  name: envoy-ai-gateway
  labels:
    istio-injection: enabled
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: registry-1.docker.io/envoyproxy
    chart: gateway-helm
    targetRevision: 1.8.1
    helm:
      releaseName: eg
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-ai-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-ai-gateway-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: registry-1.docker.io/envoyproxy
    chart: ai-gateway-crds-helm
    targetRevision: 0.7.0
    helm:
      releaseName: aieg-crd
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-ai-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-ai-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: registry-1.docker.io/envoyproxy
    chart: ai-gateway-helm
    targetRevision: 0.7.0
    helm:
      releaseName: aieg
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-ai-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
---
# ReferenceGrant allows argocd-namespace HTTPRoutes to reach services here
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: argocd-to-envoy-ai-gateway
  namespace: envoy-ai-gateway
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: argocd
  to:
    - group: ""
      kind: Service
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: envoy-ai-gateway
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: envoy-ai-gateway-policy
  namespace: envoy-ai-gateway
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["cloudflared", "istio-system", "envoy-ai-gateway"]
---
# ServiceMonitor for envoy-gateway controller metrics (port 19001)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: envoy-gateway
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - envoy-ai-gateway
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy-gateway
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
