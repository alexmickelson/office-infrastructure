apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: snow-se-tools-envoy
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - snow-se-tools
  selector:
    matchLabels:
      app: snow-se-tools-reporter
  podMetricsEndpoints:
    - targetPort: 15090
      path: /stats/prometheus
      interval: 15s
