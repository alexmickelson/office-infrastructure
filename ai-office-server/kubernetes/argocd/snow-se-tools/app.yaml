apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: snow-se-tools
spec:
  selector:
    app: snow-se-tools
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snow-se-tools
  namespace: snow-se-tools
spec:
  replicas: 1
  revisionHistoryLimit: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: snow-se-tools
  template:
    metadata:
      labels:
        app: snow-se-tools
    spec:
      containers:
        - name: webapp
          image: ghcr.io/alexmickelson/snow-se-tools:1.65@sha256:6fe0b0afa18709f3c5c4be2f3ddf8055611584f0e755bd9f0881cf87aaa22391
          ports:
            - containerPort: 4000
          env:
            - name: PHX_HOST
              value: simplesyllabuscheck.snowse.io
            - name: OIDC_REDIRECT_URI
              value: https://simplesyllabuscheck.snowse.io/auth/callback
            - name: AI_MODEL
              value: "qwen3-6-35b-q6"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: snow-se-tools-secret
                  key: DATABASE_URL
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: snow-se-tools-secret
                  key: OIDC_ISSUER
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: snow-se-tools-secret
                  key: OIDC_CLIENT_ID
            - name: AI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: snow-se-tools-secret
                  key: AI_ENDPOINT
            - name: AI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: snow-se-tools-secret
                  key: AI_ENDPOINT
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: snow-se-tools-secret
                  key: AI_API_KEY
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: snow-se-tools-secret
                  key: SECRET_KEY_BASE
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
