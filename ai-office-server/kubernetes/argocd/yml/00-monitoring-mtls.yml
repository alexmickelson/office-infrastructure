# Namespaces with Istio injection enabled (strict everywhere)
---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: kiali-operator
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: opencost
  labels:
    istio-injection: enabled
---
# Mesh-wide STRICT mTLS — all sidecar-to-sidecar traffic is encrypted
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system
spec:
  mtls:
    mode: STRICT
---
# monitoring namespace STRICT (redundant with mesh-wide but explicit)
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: monitoring
spec:
  mtls:
    mode: STRICT
