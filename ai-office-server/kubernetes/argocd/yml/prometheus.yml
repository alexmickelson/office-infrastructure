apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "85.0.3"
    helm:
      releaseName: prometheus
      values: |
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            externalUrl: "https://alexmonitoring.snowse.io/prometheus"
            additionalScrapeConfigs:
              - job_name: opencost
                honor_labels: true
                scrape_interval: 1m
                scrape_timeout: 10s
                metrics_path: /metrics
                scheme: http
                dns_sd_configs:
                  - names:
                      - opencost.opencost
                    type: A
                    port: 9003
        grafana:
          grafana.ini:
            server:
              root_url: "https://alexmonitoring.snowse.io/grafana"
              serve_from_sub_path: true
            auth.anonymous:
              enabled: true
              org_role: Viewer
          dashboards:
            default:
              istio-mesh:
                gnetId: 7639
                datasource: Prometheus
              istio-service:
                gnetId: 7636
                datasource: Prometheus
              istio-workload:
                gnetId: 7630
                datasource: Prometheus
              istio-performance:
                gnetId: 11829
                datasource: Prometheus
              istio-control-plane:
                gnetId: 7645
                datasource: Prometheus
              istio-wasm:
                gnetId: 13277
                datasource: Prometheus
              istio-mesh:
                gnetId: 7639
                datasource: Prometheus
              istio-service:
                gnetId: 7636
                datasource: Prometheus
              istio-workload:
                gnetId: 7630
                datasource: Prometheus
              istio-performance:
                gnetId: 11829
                datasource: Prometheus
              istio-control-plane:
                gnetId: 7645
                datasource: Prometheus
              istio-wasm:
                gnetId: 13277
                datasource: Prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: argocd
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-system
  hostnames:
    - "alexmonitoring.snowse.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /prometheus
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: prometheus-kube-prometheus-prometheus
          namespace: monitoring
          port: 9090
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: argocd
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-system
  hostnames:
    - "alexmonitoring.snowse.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: prometheus-grafana
          namespace: monitoring
          port: 80
---
# PodMonitor to scrape Envoy sidecar metrics from all istio-proxy containers
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-stats-monitor
  namespace: monitoring
  labels:
    monitoring: istio-proxies
spec:
  selector:
    matchExpressions:
      - { key: istio-prometheus-ignore, operator: DoesNotExist }
  namespaceSelector:
    any: true
  jobLabel: envoy-stats
  podMetricsEndpoints:
    - path: /stats/prometheus
      targetPort: 15090
      interval: 15s
      relabelings:
        - action: keep
          sourceLabels: [__meta_kubernetes_pod_container_name]
          regex: "istio-proxy"
---
# ServiceMonitor to scrape istiod control plane metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: istio-component-monitor
  namespace: monitoring
  labels:
    monitoring: istio-components
spec:
  jobLabel: istio
  targetLabels: [app]
  selector:
    matchExpressions:
      - { key: istio, operator: In, values: [pilot] }
  namespaceSelector:
    any: true
  endpoints:
    - port: http-monitoring
      interval: 15s
