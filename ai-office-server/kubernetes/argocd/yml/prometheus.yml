apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "85.0.3"
    helm:
      releaseName: prometheus
      values: |
        prometheus:
          prometheusSpec:
            externalUrl: "https://alexmonitoring.snowse.io/prometheus"
            additionalScrapeConfigs:
              # - job_name: opencost
              #   honor_labels: true
              #   scrape_interval: 1m
              #   scrape_timeout: 10s
              #   metrics_path: /metrics
              #   scheme: http
              #   dns_sd_configs:
              #     - names:
              #         - opencost.opencost
              #       type: A
              #       port: 9003
              # Recommended by istio.io/docs/ops/integrations/prometheus:
              # Discovers all ports named *-envoy-prom across sidecars and gateways
              - job_name: 'envoy-stats'
                metrics_path: /stats/prometheus
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_container_port_name]
                    action: keep
                    regex: '.*-envoy-prom'
              # Istiod control plane metrics
              - job_name: 'istiod'
                kubernetes_sd_configs:
                  - role: endpoints
                    namespaces:
                      names:
                        - istio-system
                relabel_configs:
                  - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
                    action: keep
                    regex: istiod;http-monitoring

        grafana:
          grafana.ini:
            server:
              root_url: "https://alexmonitoring.snowse.io/grafana"
              serve_from_sub_path: true
            auth.anonymous:
              enabled: true
              org_role: Viewer
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: Istio
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              istio-mesh:
                gnetId: 7639
                revision: 305
                datasource: Prometheus
              istio-service:
                gnetId: 7636
                revision: 236
                datasource: Prometheus
              istio-workload:
                gnetId: 7630
                revision: 232
                datasource: Prometheus
              istio-performance:
                gnetId: 11829
                revision: 110
                datasource: Prometheus
              istio-control-plane:
                gnetId: 7645
                revision: 223
                datasource: Prometheus
              istio-wasm:
                gnetId: 13277
                revision: 59
                datasource: Prometheus

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: argocd
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-system
  hostnames:
    - "alexmonitoring.snowse.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /prometheus
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: prometheus-kube-prometheus-prometheus
          namespace: monitoring
          port: 9090
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: argocd
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-system
  hostnames:
    - "alexmonitoring.snowse.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: prometheus-grafana
          namespace: monitoring
          port: 80
---