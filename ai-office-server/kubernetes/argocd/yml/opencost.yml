apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opencost
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://opencost.github.io/opencost-helm-chart
    chart: opencost
    targetRevision: "2.5.14"
    helm:
      releaseName: opencost
      values: |
        opencost:
          prometheus:
            internal:
              enabled: false
            external:
              enabled: true
              url: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          metrics:
            kubeStateMetrics:
              emitKsmV1Metrics: false
              emitKsmV1MetricsOnly: false
          ui:
            enabled: true
          exporter:
            extraEnv:
              LOG_LEVEL: debug
          extraObjects:
            - apiVersion: v1
              kind: ConfigMap
              metadata:
                name: opencost-pricing
                namespace: opencost
              data:
                default.json: |
                  {
                    "provider": "custom",
                    "description": "Default pricing for bare-metal k3s cluster",
                    "CPU": "0.031611",
                    "spotCPU": "0.006655",
                    "RAM": "0.004237",
                    "spotRAM": "0.000892",
                    "GPU": "0.95",
                    "spotGPU": "0.190",
                    "storage": "0.00005479452",
                    "zoneNetworkEgress": "0.01",
                    "regionNetworkEgress": "0.01",
                    "internetNetworkEgress": "0.12",
                    "network": "0.01",
                    "loadBalancer": "0.025",
                    "spotLabel": "kops.k8s.io/instancegroup",
                    "spotLabelValue": "spotinstance-nodes",
                    "awsSpotDataRegion": "us-east-1",
                    "awsSpotDataBucket": "spot-data-feed-9be528e8-af48-43e9-9b4b-af4f5d8e9a2b",
                    "awsSpotDataPrefix": "/spot",
                    "projectID": "",
                    "athenaBucketName": "s3://aws-athena-query-results-978564896215-us-east-1",
                    "athenaRegion": "us-east-1",
                    "athenaDatabase": "athenacurcfn_opencost",
                    "athenaTable": "opencost",
                    "athenaWorkgroup": "primary",
                    "masterPayerARN": "",
                    "customPricesEnabled": "true",
                    "defaultIdle": "true",
                    "azureSubscriptionID": "",
                    "azureClientID": "",
                    "azureClientSecret": "",
                    "azureTenantID": "",
                    "azureBillingRegion": "",
                    "azureBillingAccount": "",
                    "azureOfferID": "",
                    "currencyCode": "USD",
                    "discount": "0",
                    "discountedCPU": "0.031611",
                    "discountedSpotCPU": "0.006655",
                    "discountedRAM": "0.004237",
                    "discountedSpotRAM": "0.000892",
                    "discountedGPU": "0.95",
                    "discountedSpotGPU": "0.190",
                    "discountedStorage": "0.00005479452",
                    "discountedZoneNetworkEgress": "0.01",
                    "discountedRegionNetworkEgress": "0.01",
                    "discountedInternetNetworkEgress": "0.12",
                    "sharedCPU": "0.031611",
                    "sharedRAM": "0.004237",
                    "sharedGPU": "0.95",
                    "sharedStorage": "0.00005479452",
                    "sharedZoneNetworkEgress": "0.01",
                    "sharedRegionNetworkEgress": "0.01",
                    "sharedInternetNetworkEgress": "0.12",
                    "sharedLoadBalancer": "0.025",
                    "neglectedResources": "0",
                    "billableResources": "0"
                  }
  destination:
    server: https://kubernetes.default.svc
    namespace: opencost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: argocd-gateway-to-opencost
  namespace: opencost
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: argocd
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opencost
  namespace: argocd
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-system
  hostnames:
    - "alexopencost.snowse.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: opencost
          namespace: opencost
          port: 9090
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: opencost-policy
  namespace: opencost
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["argocd", "istio-system"]
