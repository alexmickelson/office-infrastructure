apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jaeger
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://jaegertracing.github.io/helm-charts
    chart: jaeger
    targetRevision: "4.7.0"
    helm:
      releaseName: jaeger
      values: |
        userconfig:
          service:
            extensions: [jaeger_storage, jaeger_query, remote_sampling, healthcheckv2]
            pipelines:
              traces:
                receivers: [otlp, jaeger, zipkin]
                processors: [batch, adaptive_sampling]
                exporters: [jaeger_storage_exporter]
            telemetry:
              resource:
                service.name: jaeger
              metrics:
                level: detailed
                readers:
                  - pull:
                      exporter:
                        prometheus:
                          host: 0.0.0.0
                          port: 8888
          extensions:
            healthcheckv2:
              use_v2: true
              http:
                endpoint: "0.0.0.0:13133"
            jaeger_query:
              base_path: /jaeger
              storage:
                traces: some_store
            jaeger_storage:
              backends:
                some_store:
                  memory:
                    max_traces: 100000
            remote_sampling:
              adaptive:
                sampling_store: some_store
                initial_sampling_probability: 0.1
              http: {}
              grpc: {}
          receivers:
            otlp:
              protocols:
                grpc: {}
                http: {}
            jaeger:
              protocols:
                grpc: {}
                thrift_binary: {}
                thrift_compact: {}
                thrift_http: {}
            zipkin: {}
          processors:
            batch: {}
            adaptive_sampling: {}
          exporters:
            jaeger_storage_exporter:
              trace_storage: some_store
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jaeger
  namespace: argocd
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-system
  hostnames:
    - "alexmonitoring.snowse.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /jaeger
      backendRefs:
        - name: jaeger
          namespace: monitoring
          port: 16686
---
# Istio sends traces to zipkin.istio-system:9411 by default.
# This ExternalName service routes that traffic to Jaeger in the monitoring namespace.
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: istio-system
spec:
  type: ExternalName
  externalName: jaeger.monitoring.svc.cluster.local
  ports:
    - port: 9411
      targetPort: 9411
      name: http-query
