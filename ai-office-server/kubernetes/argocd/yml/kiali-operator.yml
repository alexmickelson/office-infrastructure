apiVersion: v1
kind: Namespace
metadata:
  name: kiali-operator
  annotations:
    repo: "https://github.com/alexmickelson/office-infrastructure"
    path: "ai-office-server/kubernetes/argocd/yml/kiali-operator.yml"
  labels:
    istio-injection: enabled
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kiali-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kiali.org/helm-charts
    chart: kiali-operator
    targetRevision: "2.26.0"
    helm:
      releaseName: kiali-operator
      values: |
        cr:
          create: true
          namespace: istio-system
          spec:
            server:
              web_root: "/kiali"
            auth:
              # anonymous is safe here - Kiali is only reachable via Cloudflare tunnel
              # which requires authentication, and Istio AuthorizationPolicy restricts
              # in-cluster access to the cloudflared and istio-system namespaces only
              strategy: anonymous
            external_services:
              grafana:
                enabled: true
                url: "https://alexmonitoring.snowse.io/grafana"
                in_cluster_url: "http://prometheus-grafana.monitoring.svc.cluster.local:80"
                auth:
                  type: none
              tracing:
                enabled: true
                use_grpc: false
                in_cluster_url: "http://jaeger.monitoring.svc.cluster.local:16686"
              prometheus:
                url: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/"
            deployment:
              pod_labels:
                sidecar.istio.io/inject: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: kiali-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali
  namespace: argocd
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-system
  hostnames:
    - "alexmonitoring.snowse.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /kiali
      backendRefs:
        - name: kiali
          namespace: istio-system
          port: 20001
