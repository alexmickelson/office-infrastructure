apiVersion: v1
kind: Namespace
metadata:
  name: pantheon
  annotations:
    repo: "https://github.com/alexmickelson/office-infrastructure"
    path: "ai-office-server/kubernetes/argocd/yml/pantheon-gateway.yml"
  labels:
    istio-injection: enabled
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-pantheon
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/alexmickelson/office-infrastructure.git
    targetRevision: main
    path: ai-office-server/kubernetes/argocd/pantheon

    kustomize:
      commonAnnotations:
        argocd.argoproj.io/managed-by: argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: pantheon

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
