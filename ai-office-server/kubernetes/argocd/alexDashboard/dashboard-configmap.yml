apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-html
  namespace: alex-dashboard
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>SnowSE Dashboard</title>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
          background: linear-gradient(135deg, #0d1b36, #1e376c, #0d1b36);
          min-height: 100vh;
          color: #e0e0e0;
          padding: 2rem;
        }

        .container {
          max-width: 1200px;
          margin: 0 auto;
        }

        header {
          text-align: center;
          margin-bottom: 3rem;
          padding: 2rem;
        }

        header h1 {
          font-size: 2.5rem;
          font-weight: 700;
          background: linear-gradient(135deg, #4a7ad4, #1e376c);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          margin-bottom: 0.5rem;
        }

        header p {
          color: #8899b4;
          font-size: 1.1rem;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
          gap: 1rem;
        }

        .card {
          background: rgba(30, 55, 108, 0.3);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(74, 122, 212, 0.15);
          border-radius: 12px;
          padding: 1.25rem;
          transition: all 0.3s ease;
          cursor: pointer;
          position: relative;
          overflow: hidden;
        }

        .card::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 2px;
          background: linear-gradient(90deg, #4a7ad4, #1e376c);
          opacity: 0;
          transition: opacity 0.3s ease;
        }

        .card:hover {
          transform: translateY(-3px);
          border-color: rgba(74, 122, 212, 0.3);
          box-shadow: 0 6px 24px rgba(30, 55, 108, 0.3);
          background: rgba(30, 55, 108, 0.45);
        }

        .card:hover::before {
          opacity: 1;
        }

        .card h3 {
          font-size: 1.1rem;
          font-weight: 600;
          margin-bottom: 0.75rem;
          color: #ffffff;
        }

        .card .url {
          font-size: 0.75rem;
          color: #6d9bf5;
          font-family: 'SF Mono', 'Fira Code', monospace;
          word-break: break-all;
          opacity: 0.8;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <header>
          <h1>SnowSE Dashboard</h1>
          <p>internal tools & services</p>
        </header>

        <div class="grid">

          <div class="card" onclick="window.open('https://alexagent.snowse.io', '_blank')">
            <h3>AI Agent</h3>
            <div class="url">alexagent.snowse.io</div>
          </div>

          <div class="card" onclick="window.open('https://alexargocd.snowse.io', '_blank')">
            <h3>ArgoCD</h3>
            <div class="url">alexargocd.snowse.io</div>
          </div>

          <div class="card" onclick="window.open('https://alexmonitoring.snowse.io', '_blank')">
            <h3>Monitoring</h3>
            <div class="url">alexmonitoring.snowse.io</div>
          </div>

          <div class="card" onclick="window.open('https://alexopencost.snowse.io', '_blank')">
            <h3>OpenCost</h3>
            <div class="url">alexopencost.snowse.io</div>
          </div>

          <div class="card" onclick="window.open('https://discordadmin.snowse.io', '_blank')">
            <h3>Discord Admin</h3>
            <div class="url">discordadmin.snowse.io</div>
          </div>

          <div class="card" onclick="window.open('https://alexhermes-dashboard.snowse.io', '_blank')">
            <h3>Hermes Dashboard</h3>
            <div class="url">alexhermes-dashboard.snowse.io</div>
          </div>

          <div class="card" onclick="window.open('https://alexpantheon.snowse.io', '_blank')">
            <h3>Pantheon</h3>
            <div class="url">alexpantheon.snowse.io</div>
          </div>

          <div class="card" onclick="window.open('https://simplesyllabuscheck.snowse.io', '_blank')">
            <h3>Simple Syllabus Check</h3>
            <div class="url">simplesyllabuscheck.snowse.io</div>
          </div>

          <div class="card" onclick="window.open('https://alexvault.snowse.io', '_blank')">
            <h3>Vault</h3>
            <div class="url">alexvault.snowse.io</div>
          </div>

          <div class="card" onclick="window.open('https://alexdashboard.snowse.io', '_blank')">
            <h3>Dashboard</h3>
            <div class="url">alexdashboard.snowse.io</div>
          </div>

        </div>
      </div>
    </body>
    </html>
