apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://raw.githubusercontent.com/alexmickelson/ai_pantheon/main/kube/postgres.yaml
  - https://raw.githubusercontent.com/alexmickelson/ai_pantheon/main/kube/app.yaml

configMapGenerator:
  - name: app-config
    namespace: pantheon
    behavior: merge
    literals:
      - PHX_HOST=alexpantheon.snowse.io
      - OIDC_REDIRECT_URI=https://alexpantheon.snowse.io/auth/callback
      - POOL_SIZE=10
      - PORT=4000

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: pantheon
        namespace: pantheon
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: pantheon
        template:
          metadata:
            labels:
              app: pantheon
          spec:
            containers:
              - name: pantheon
                image: ghcr.io/alexmickelson/pantheon-gateway:33.42@sha256:0e41dc742bcee0196783ff63ff7c32f5d0c1e9cfe1d56aa68e9e785b9cf71d17
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: pantheon
        namespace: pantheon
      spec:
        parentRefs:
          - group: gateway.networking.k8s.io	
            kind: Gateway	
            name: main-gateway
            namespace: istio-system
        hostnames:
          - "alexpantheon.snowse.io"
