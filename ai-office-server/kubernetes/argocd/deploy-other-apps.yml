
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-other-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/alexmickelson/office-infrastructure
    targetRevision: HEAD
    path: ai-office-server/kubernetes/argocd/yml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: argocd-cmd-params-cm
      namespace: argocd
      jsonPointers:
        - /metadata/annotations/argocd.argoproj.io~1tracking-id
        - /metadata/labels
  syncPolicy:
    automated:
      prune: true
      selfHeal: true