apiVersion: v1
kind: Namespace
metadata:
  name: cloudflared
  labels:
    istio-injection: enabled
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: cloudflared
spec:
  mtls:
    mode: STRICT
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/alexmickelson/office-infrastructure.git
    targetRevision: HEAD
    path: ai-office-server/kubernetes/cloudflare/yml
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflared
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
