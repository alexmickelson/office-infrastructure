<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Whisper Push-to-Talk</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
      }
      h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; color: #fff; }

      .controls {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        margin-bottom: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .controls label { font-size: 0.85rem; color: #aaa; }
      .controls input[type="text"] {
        background: #1e1e1e;
        border: 1px solid #333;
        color: #e0e0e0;
        padding: 0.4rem 0.6rem;
        border-radius: 6px;
        font-size: 0.85rem;
        width: 220px;
      }
      .controls select {
        background: #1e1e1e;
        border: 1px solid #333;
        color: #e0e0e0;
        padding: 0.4rem 0.6rem;
        border-radius: 6px;
        font-size: 0.85rem;
      }

      /* PTT button */
      #pttBtn {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 4px solid #2d7d46;
        background: #1a2e1f;
        color: #6fcf89;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        user-select: none;
        touch-action: none;
        transition: background 0.1s, border-color 0.1s, transform 0.08s, box-shadow 0.1s;
        box-shadow: 0 0 0 0 rgba(45,125,70,0);
        margin: 1rem 0;
        outline: none;
      }
      #pttBtn.active {
        background: #2d7d46;
        border-color: #6fcf89;
        color: #fff;
        transform: scale(0.94);
        box-shadow: 0 0 0 12px rgba(45,125,70,0.25);
      }
      #pttBtn.flushing {
        background: #7d6a1a;
        border-color: #f0c040;
        color: #fff;
        cursor: not-allowed;
      }
      #pttBtn span { pointer-events: none; display: block; line-height: 1.3; }

      .status {
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 0.75rem;
        min-height: 1.2em;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #555;
        flex-shrink: 0;
      }
      .dot.recording { background: #e05; animation: pulse 1s infinite; }
      .dot.sending   { background: #fa0; }
      .dot.idle      { background: #2d7; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
      }

      #volumeCanvas {
        width: 100%;
        max-width: 600px;
        height: 50px;
        background: #111;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        margin-bottom: 0.75rem;
        display: block;
      }

      .error-box {
        background: #2a1010;
        border: 1px solid #5a2020;
        color: #f88;
        border-radius: 8px;
        padding: 0.6rem 1rem;
        font-size: 0.85rem;
        width: 100%;
        max-width: 600px;
        margin-bottom: 0.75rem;
        display: none;
      }

      #transcript {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 10px;
        padding: 1.25rem 1.5rem;
        width: 100%;
        max-width: 600px;
        min-height: 160px;
        font-size: 1.05rem;
        line-height: 1.7;
        white-space: pre-wrap;
        word-break: break-word;
        color: #e8e8e8;
      }
      #transcript .pending { color: #888; font-style: italic; }

      .meta {
        font-size: 0.75rem;
        color: #555;
        margin-top: 0.5rem;
        width: 100%;
        max-width: 600px;
        display: flex;
        gap: 1rem;
      }

      #clearBtn {
        margin-top: 0.75rem;
        padding: 0.4rem 1rem;
        border: none;
        border-radius: 8px;
        background: #333;
        color: #ccc;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
      }
      #clearBtn:hover { background: #444; }
    </style>
  </head>
  <body>
    <h1>Whisper Push-to-Talk</h1>

    <div class="controls">
      <label>Server
        <input type="text" id="serverUrl" value="https://ai-office-server:8443" />
      </label>
      <label>Language
        <select id="language">
          <option value="auto">auto</option>
          <option value="en" selected>en</option>
          <option value="de">de</option>
          <option value="fr">fr</option>
          <option value="es">es</option>
          <option value="ja">ja</option>
          <option value="zh">zh</option>
        </select>
      </label>
    </div>

    <button id="pttBtn"><span>Hold to<br>Record</span></button>

    <div class="status">
      <span class="dot idle" id="dot"></span>
      <span id="statusText">Ready — hold the button to record</span>
    </div>

    <div class="error-box" id="errorBox"></div>

    <canvas id="volumeCanvas"></canvas>

    <div id="transcript"><span class="pending">Transcript will appear here...</span></div>

    <div class="meta">
      <span id="wordCount">0 words</span>
      <span id="lastLatency"></span>
    </div>

    <button id="clearBtn">✕ Clear transcript</button>

    <script>
      const pttBtn      = document.getElementById('pttBtn');
      const clearBtn    = document.getElementById('clearBtn');
      const transcriptEl = document.getElementById('transcript');
      const statusText  = document.getElementById('statusText');
      const dot         = document.getElementById('dot');
      const errorBox    = document.getElementById('errorBox');
      const wordCountEl = document.getElementById('wordCount');
      const lastLatencyEl = document.getElementById('lastLatency');

      const canvas = document.getElementById('volumeCanvas');
      const ctx2d  = canvas.getContext('2d');

      let mediaStream   = null;
      let recorder      = null;
      let chunks        = [];
      let confirmedText = '';
      let isRecording   = false;

      const PROMPT_WORDS = 20;
      const HISTORY_S    = 6;
      const SAMPLE_RATE  = 30;
      const MAX_BARS     = HISTORY_S * SAMPLE_RATE;
      const volHistory   = [];
      let analyserNode   = null;
      let vizRaf         = null;

      // ── Status ────────────────────────────────────────────────────────────
      function setStatus(msg, state) {
        statusText.textContent = msg;
        dot.className = 'dot ' + (state || 'idle');
      }

      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
        setTimeout(() => { errorBox.style.display = 'none'; }, 6000);
      }

      // ── Transcript ────────────────────────────────────────────────────────
      function renderTranscript(pendingText) {
        transcriptEl.innerHTML = '';
        if (!confirmedText && !pendingText) {
          transcriptEl.innerHTML = '<span class="pending">Transcript will appear here...</span>';
          return;
        }
        if (confirmedText) transcriptEl.appendChild(document.createTextNode(confirmedText));
        if (pendingText) {
          const span = document.createElement('span');
          span.className = 'pending';
          span.textContent = (confirmedText ? ' ' : '') + pendingText;
          transcriptEl.appendChild(span);
        }
      }

      function updateMeta() {
        const words = confirmedText.trim().split(/\s+/).filter(Boolean).length;
        wordCountEl.textContent = `${words} words`;
      }

      function buildPrompt() {
        return confirmedText.trim().split(/\s+/).filter(Boolean).slice(-PROMPT_WORDS).join(' ');
      }

      function deduplicateLeading(newText) {
        newText = newText.trim();
        if (!confirmedText || !newText) return newText;
        const prevWords = confirmedText.trim().split(/\s+/).filter(Boolean);
        const newWords  = newText.split(/\s+/).filter(Boolean);
        for (let overlap = Math.min(8, prevWords.length, newWords.length); overlap >= 2; overlap--) {
          if (prevWords.slice(-overlap).join(' ').toLowerCase() ===
              newWords.slice(0, overlap).join(' ').toLowerCase()) {
            return newWords.slice(overlap).join(' ');
          }
        }
        return newText;
      }

      // ── Visualizer ────────────────────────────────────────────────────────
      function startViz(stream) {
        const audioCtx = new AudioContext();
        const source = audioCtx.createMediaStreamSource(stream);
        analyserNode = audioCtx.createAnalyser();
        analyserNode.fftSize = 1024;
        source.connect(analyserNode);
        const buf = new Uint8Array(analyserNode.frequencyBinCount);
        function tick() {
          vizRaf = requestAnimationFrame(tick);
          analyserNode.getByteFrequencyData(buf);
          const rms = Math.sqrt(buf.reduce((s, v) => s + v * v, 0) / buf.length) / 255;
          volHistory.push(rms);
          if (volHistory.length > MAX_BARS) volHistory.shift();
          drawViz();
        }
        tick();
      }

      function stopViz() {
        if (vizRaf) { cancelAnimationFrame(vizRaf); vizRaf = null; }
        drawViz();
      }

      function drawViz() {
        const W = canvas.offsetWidth  * devicePixelRatio;
        const H = canvas.offsetHeight * devicePixelRatio;
        if (canvas.width !== W || canvas.height !== H) { canvas.width = W; canvas.height = H; }
        ctx2d.clearRect(0, 0, W, H);
        const barW = W / MAX_BARS;
        for (let i = 0; i < volHistory.length; i++) {
          const v = volHistory[i];
          ctx2d.fillStyle = `hsl(${120 - v * 120},80%,45%)`;
          ctx2d.fillRect(i * barW, H - v * H, Math.max(1, barW - 1), v * H);
        }
      }
      drawViz();

      // ── Inference ─────────────────────────────────────────────────────────
      async function sendBlob(blob) {
        const server   = document.getElementById('serverUrl').value.replace(/\/$/, '');
        const language = document.getElementById('language').value;
        const t0 = Date.now();

        const formData = new FormData();
        formData.append('file', blob, 'audio.webm');
        formData.append('response_format', 'json');
        formData.append('language', language === 'auto' ? '' : language);
        const prompt = buildPrompt();
        if (prompt) formData.append('prompt', prompt);

        setStatus('Transcribing…', 'sending');
        try {
          const res = await fetch(`${server}/inference`, { method: 'POST', body: formData });
          if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
          const data = await res.json();
          lastLatencyEl.textContent = `last: ${Date.now() - t0}ms`;
          let text = (data.text || '').trim();
          if (text) {
            text = deduplicateLeading(text);
            if (text) confirmedText = confirmedText ? confirmedText + ' ' + text : text;
          }
          renderTranscript('');
          updateMeta();
        } catch (err) {
          showError('Error: ' + err.message);
        }
      }

      // ── PTT core ──────────────────────────────────────────────────────────
      async function pressStart() {
        if (isRecording || pttBtn.classList.contains('flushing')) return;

        // Acquire mic on first press, reuse afterwards
        if (!mediaStream) {
          try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            startViz(mediaStream);
          } catch (err) {
            showError('Microphone access denied: ' + err.message);
            return;
          }
        }

        chunks = [];
        const mimeType = getSupportedMimeType();
        recorder = new MediaRecorder(mediaStream, mimeType ? { mimeType } : undefined);
        recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = async () => {
          const blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
          pttBtn.classList.add('flushing');
          pttBtn.querySelector('span').textContent = 'Transcribing…';
          await sendBlob(blob);
          pttBtn.classList.remove('flushing');
          pttBtn.querySelector('span').innerHTML = 'Hold to<br>Record';
          setStatus('Ready — hold the button to record', 'idle');
        };
        recorder.start(100);
        isRecording = true;
        pttBtn.classList.add('active');
        setStatus('Recording…', 'recording');
      }

      function pressEnd() {
        if (!isRecording) return;
        isRecording = false;
        pttBtn.classList.remove('active');
        if (recorder && recorder.state === 'recording') recorder.stop();
      }

      function getSupportedMimeType() {
        return ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg']
          .find(t => MediaRecorder.isTypeSupported(t)) || '';
      }

      // Mouse
      pttBtn.addEventListener('mousedown', (e) => { e.preventDefault(); pressStart(); });
      window.addEventListener('mouseup',  () => pressEnd());

      // Touch (mobile)
      pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); pressStart(); }, { passive: false });
      window.addEventListener('touchend',   () => pressEnd());
      window.addEventListener('touchcancel',() => pressEnd());

      // Space bar shortcut
      window.addEventListener('keydown', (e) => { if (e.code === 'Space' && !e.repeat) { e.preventDefault(); pressStart(); }});
      window.addEventListener('keyup',   (e) => { if (e.code === 'Space') pressEnd(); });

      clearBtn.addEventListener('click', () => {
        confirmedText = '';
        renderTranscript('');
        updateMeta();
        lastLatencyEl.textContent = '';
      });
    </script>
  </body>
</html>
