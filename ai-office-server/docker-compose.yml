services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    ports:
      - "8080:8080"
    environment:
      - WEBUI_PORT=8080
      - DATABASE_URL=postgresql://openwebui:9hb02121-9br@openwebui-db:5432/openwebui_db
      - MCP_ENABLED=true
    volumes:
      - /data/openwebui:/app/backend/data
    restart: unless-stopped
    depends_on:
      openwebui-db:
        condition: service_started

  openwebui-db:
    image: postgres:17
    container_name: openwebui-db
    environment:
      POSTGRES_USER: openwebui
      POSTGRES_PASSWORD: 9hb02121-9br
      POSTGRES_DB: openwebui_db
    volumes:
      - /data/openwebui-pg:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwebui"]
      interval: 5s
      timeout: 5s
      retries: 5

  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    container_name: llama-server
    command: >
      --port 8081
      --models-preset /models/config.ini
    # --model-dir /models
    volumes:
      - /data/models:/models
      # - /data/huggingface-cache:/root/.cache/llama.cpp
      - ./config.ini:/models/config.ini:ro
    ports:
      - "8081:8081"
    restart: unless-stopped
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128

  whisper:
    image: ghcr.io/ggml-org/whisper.cpp:main-vulkan
    container_name: whisper
    entrypoint:
      [
        "whisper-server",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "-m",
        "/models/ggml-large-v3.bin",
        "--convert",
      ]
    ports:
      - 8082:8080
    command: []
    volumes:
      - /data/models:/models
    restart: unless-stopped
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128

  whisper-proxy:
    image: nginx:alpine
    container_name: whisper-proxy
    ports:
      - "8443:443"
    volumes:
      - ./nginx/whisper-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - /data/whisper-certs:/etc/nginx/certs:ro
    depends_on:
      - whisper
    restart: unless-stopped

