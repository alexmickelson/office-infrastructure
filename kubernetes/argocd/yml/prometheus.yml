apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "85.0.3"
    helm:
      releaseName: prometheus
      values: |
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            externalUrl: "https://alexmonitoring.snowse.io/prometheus"
            routePrefix: "/prometheus"
        grafana:
          grafana.ini:
            server:
              root_url: "https://alexmonitoring.snowse.io/grafana"
              serve_from_sub_path: true
        prometheus:
          prometheusSpec:
            additionalScrapeConfigs:
              - job_name: opencost
                honor_labels: true
                scrape_interval: 1m
                scrape_timeout: 10s
                metrics_path: /metrics
                scheme: http
                dns_sd_configs:
                  - names:
                      - opencost.opencost
                    type: A
                    port: 9003
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
