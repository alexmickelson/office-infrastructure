apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opencost
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://opencost.github.io/opencost-helm-chart
    chart: opencost
    targetRevision: "2.5.14"
    helm:
      releaseName: opencost
      values: |
        opencost:
          prometheus:
            internal:
              enabled: false
            external:
              enabled: true
              url: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          metrics:
            kubeStateMetrics:
              emitKsmV1Metrics: false
              emitKsmV1MetricsOnly: false
          ui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: opencost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: argocd-gateway-to-opencost
  namespace: opencost
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: argocd
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opencost
  namespace: argocd
spec:
  parentRefs:
    - name: main-gateway
      namespace: istio-system
  hostnames:
    - "opencost.alex.snowse.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: opencost
          namespace: opencost
          port: 9090
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: opencost-policy
  namespace: opencost
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["argocd", "istio-system"]
