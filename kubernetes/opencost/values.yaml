opencost:
  prometheus:
    internal:
      enabled: false
    external:
      enabled: true
      url: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
  metrics:
    kubeStateMetrics:
      emitKsmV1Metrics: false
      emitKsmV1MetricsOnly: false
  ui:
    enabled: true
    ingress:
      enabled: true
      hosts:
        - host: opencost.alex-kube.duckdns.org
          paths:
            - /
