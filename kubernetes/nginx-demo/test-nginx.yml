apiVersion: v1
kind: Namespace
metadata:
  name: test-nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: test-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: test-nginx
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
---
# Gateway — provisioned by NGINX Gateway Fabric (GatewayClass: nginx).
# Gets its own Azure LoadBalancer IP.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: test-gateway
  namespace: test-nginx
spec:
  gatewayClassName: nginx   # created automatically by the NGF helm chart
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
# HTTPRoute — sends /test/* traffic to the nginx service.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx
  namespace: test-nginx
spec:
  parentRefs:
    - name: test-gateway
      namespace: test-nginx
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /test
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: nginx
          port: 80
