apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    tunnel: 141192d6-c05c-4cb4-816b-56bd6ce29b1b
    credentials-file: /etc/cloudflared/credentials.json

    ingress:
      - hostname: alexargocd.snowse.io
        service: http://main-gateway-istio.istio-system.svc.cluster.local:80
      - hostname: alexmonitoring.snowse.io
        service: http://main-gateway-istio.istio-system.svc.cluster.local:80
      - hostname: alexopencost.snowse.io
        service: http://main-gateway-istio.istio-system.svc.cluster.local:80
      - hostname: alexenvoy.snowse.io
        service: http://main-gateway-istio.istio-system.svc.cluster.local:80
      - service: http_status:404
